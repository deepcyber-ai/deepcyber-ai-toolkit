site_name: DeepCyber AI Red Team Toolkit
site_description: Documentation for the DeepCyber AI Red Team Toolkit
site_author: Deep Cyber Ltd

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: cyan
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
  icon:
    logo: material/shield-lock

nav:
  - Home: index.md
  - Getting Started:
    - Red Team Methodology: getting-started/methodology.md
    - Project Setup: getting-started/project-setup.md
    - API Reference Template: getting-started/api-reference.md
  - Guides:
    - PyRIT Red Teaming: guides/pyrit-red-teaming.md
    - Relay Proxy: guides/relay-proxy.md
    - Regulated Mode: guides/regulated-mode.md
  - Reference:
    - AI Assistant Guide: reference/ai-assistant.md
    - Tool Quick Reference: reference/tools.md
    - target.yaml Schema: reference/target-yaml.md
    - OWASP LLM Top 10: reference/owasp-top10.md
  - About:
    - Roadmap: about/roadmap.md
    - VM Build System: about/vm-build.md

docs_dir: site-src

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
  - admonition
  - toc:
      permalink: true

plugins:
  - search
