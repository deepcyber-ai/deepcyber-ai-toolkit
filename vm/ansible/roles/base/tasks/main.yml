---
# Base system configuration: user, locale, timezone, sudoers, core packages

- name: Set hostname
  ansible.builtin.hostname:
    name: deepcyber

- name: Ensure deepcyber user exists
  ansible.builtin.user:
    name: "{{ deepcyber_user }}"
    shell: /bin/bash
    groups: sudo,adm
    append: true
    create_home: true

- name: Install passwordless sudo for deepcyber
  ansible.builtin.copy:
    src: sudoers-deepcyber
    dest: /etc/sudoers.d/deepcyber
    mode: "0440"
    validate: "visudo -cf %s"

- name: Set locale to en_US.UTF-8
  ansible.builtin.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Set default locale
  ansible.builtin.copy:
    content: |
      LANG=en_US.UTF-8
      LC_ALL=en_US.UTF-8
    dest: /etc/default/locale
    mode: "0644"

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
  retries: 3
  delay: 10
  register: result
  until: result is not failed

- name: Install base development packages
  ansible.builtin.apt:
    name:
      - build-essential
      - git
      - curl
      - wget
      - jq
      - unzip
      - cargo
      - rustc
      - ca-certificates
      - gnupg
      - software-properties-common
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - libffi-dev
      - libssl-dev
      - rsync
      - chromium
      - firefox-esr
    state: present
  retries: 3
  delay: 10
  register: result
  until: result is not failed

# ---- VSCodium (open-source VS Code) ----

- name: Download VSCodium .deb package
  ansible.builtin.shell:
    cmd: |
      ARCH=$(dpkg --print-architecture)
      # Get latest version tag from GitHub API
      VER=$(wget -qO- https://api.github.com/repos/VSCodium/vscodium/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+' || echo "1.109.51242")
      wget -q "https://github.com/VSCodium/vscodium/releases/download/${VER}/codium_${VER}_${ARCH}.deb" \
        -O /tmp/codium.deb
    creates: /tmp/codium.deb
  retries: 3
  delay: 10
  register: result
  until: result is not failed

- name: Install VSCodium from .deb
  ansible.builtin.apt:
    deb: /tmp/codium.deb
    state: present
