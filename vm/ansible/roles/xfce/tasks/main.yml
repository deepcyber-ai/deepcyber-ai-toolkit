---
# XFCE desktop environment and display manager

- name: Install XFCE desktop
  ansible.builtin.apt:
    name:
      - kali-desktop-xfce
    state: present
    update_cache: true
  retries: 3
  delay: 10
  register: result
  until: result is not failed

- name: Install LightDM display manager
  ansible.builtin.apt:
    name:
      - lightdm
      - lightdm-gtk-greeter
      - lightdm-gtk-greeter-settings
    state: present
  retries: 3
  delay: 10
  register: result
  until: result is not failed

- name: Install XFCE extras
  ansible.builtin.apt:
    name:
      - xfce4-terminal
      - thunar
      - mousepad
      - xfce4-screenshooter
      - xfce4-taskmanager
      - ristretto
    state: present
  retries: 3
  delay: 10
  register: result
  until: result is not failed

- name: Set LightDM as default display manager
  ansible.builtin.debconf:
    name: lightdm
    question: shared/default-x-display-manager
    vtype: select
    value: lightdm

- name: Set graphical target as default
  ansible.builtin.command:
    cmd: systemctl set-default graphical.target
  changed_when: true
