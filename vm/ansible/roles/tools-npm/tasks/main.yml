---
# Node.js and npm-based tool installation

- name: Install Node.js LTS prerequisites
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: true

# Kali may ship an older Node.js. Install Node 20 LTS via NodeSource if needed.
- name: Check Node.js version
  ansible.builtin.command:
    cmd: node --version
  register: node_version
  changed_when: false

- name: Install NodeSource Node.js 20 LTS (if system version is too old)
  when: node_version.stdout is version('v18', '<')
  block:
    - name: Download NodeSource setup script
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/setup_20.x
        dest: /tmp/nodesource_setup.sh
        mode: "0755"

    - name: Run NodeSource setup
      ansible.builtin.command:
        cmd: bash /tmp/nodesource_setup.sh
      changed_when: true

    - name: Install Node.js from NodeSource
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Clean up NodeSource setup script
      ansible.builtin.file:
        path: /tmp/nodesource_setup.sh
        state: absent

- name: Install global npm packages
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  loop:
    - promptfoo
    - "@anthropic-ai/claude-code"
    - "@google/gemini-cli"
    - "@openai/codex"
