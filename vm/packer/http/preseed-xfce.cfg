# DeepCyber VM — Kali Linux Unattended Install Preseed
#
# Creates a minimal Kali system with XFCE desktop and the `deepcyber` user.
# No Kali tool metapackages (kali-linux-default, kali-tools-*) are installed.

# ---- Locale & Keyboard ----
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# ---- Clock ----
d-i time/zone string UTC
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

# ---- Network ----
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string deepcyber
d-i netcfg/get_domain string local

# ---- Mirror ----
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string
d-i mirror/suite string kali-rolling

# ---- User Account ----
# No root login — deepcyber is the primary user with sudo
d-i passwd/root-login boolean false
d-i passwd/user-fullname string DeepCyber
d-i passwd/username string deepcyber
d-i passwd/user-password password deepcyber
d-i passwd/user-password-again password deepcyber

# ---- Partitioning ----
# Single partition, whole disk, EFI-aware
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean true

# ---- Package Selection ----
# Minimal: XFCE desktop + essential system packages only.
# No kali-linux-default, no kali-tools-* metapackages.
tasksel tasksel/first multiselect
d-i pkgsel/include string \
  kali-desktop-xfce \
  openssh-server \
  sudo \
  curl \
  wget \
  git \
  python3 \
  python3-pip \
  python3-venv \
  build-essential \
  ca-certificates \
  gnupg \
  software-properties-common \
  plymouth \
  plymouth-themes

# ---- Misc ----
popularity-contest popularity-contest/participate boolean false
d-i pkgsel/upgrade select full-upgrade

# ---- GRUB ----
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ---- Finish ----
d-i finish-install/reboot_in_progress note

# ---- Late Command ----
# Enable SSH for Packer provisioning, add deepcyber to sudo group
d-i preseed/late_command string \
  in-target systemctl enable ssh ; \
  in-target usermod -aG sudo deepcyber
